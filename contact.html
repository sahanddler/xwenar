<!doctype html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>Xwenar</title>

<meta name="description" content="Contact Xwenar – Kurdish digital library for reading and learning.">
<meta name="keywords" content="contact Xwenar, Kurdish books, Kurdish library">
<meta name="author" content="Xwenar Library">

<link rel="stylesheet" href="style.css" />

<style>
body{
background:#fff7f8;
line-height:2;
font-family:"rabar";
}

.contact-wrap{
max-width:850px;
margin:40px auto;
background:#ffffff;
border-radius:20px;
padding:32px 28px;
box-shadow:0 15px 40px rgba(0,0,0,.08);
}

.contact-title{
text-align:center;
font-size:32px;
font-weight:900;
color:#ff5722;
margin-bottom:18px;
}

.contact-desc{
text-align:center;
font-size:16px;
color:#374151;
margin-bottom:28px;
}

.contact-box{
display:flex;
flex-direction:column;
gap:18px;
}

.contact-item{
display:flex;
align-items:center;
gap:14px;
background:#fff1ec;
border-radius:16px;
padding:16px 18px;
font-size:16px;
font-weight:700;
color:#1f2937;
}

.contact-icon{
width:48px;
height:48px;
border-radius:14px;
background:#ff5722;
color:#fff;
display:flex;
align-items:center;
justify-content:center;
font-size:22px;
flex-shrink:0;
}

.contact-item a{
color:#1f2937;
text-decoration:none;
word-break:break-all;
}

.contact-item a:hover{
color:#ff5722;
}

.contact-footer{
margin-top:30px;
text-align:center;
font-weight:800;
color:#ff5722;
font-size:18px;
}

</style>
</head>

<body>

<!-- TOP BAR -->
<div class="topbar">
<div class="row">

<div class="brand" onclick="location.href='index.html'" style="cursor:pointer;">
<div class="logo"></div>
<span id="brandTitle">Xwenar</span>
</div>

<select id="langSelect" style="padding:6px 10px;border-radius:8px;">
<option value="en">English</option>
<option value="ckb">کوردی</option>
</select>

</div>
</div>


<div class="contact-wrap">

<div class="contact-title" id="contactTitle">Contact Us</div>

<div class="contact-desc" id="contactDesc"></div>

<div class="contact-box">

<div class="contact-item">
<div class="contact-icon">📧</div>
<div>
<div id="emailTitle">Email</div>
<a href="mailto:sahanddlir31@gmail.com">
sahanddlir31@gmail.com
</a>
</div>
</div>

<div class="contact-item">
<div class="contact-icon">📞</div>
<div>
<div id="phoneTitle">Phone</div>
<a href="tel:+9647512461388">
<span dir="ltr">+964 751 246 1388</span>
</a>
</div>
</div>

</div>

<div class="contact-footer" id="contactFooter"></div>

</div>


<script>

const langSelect = document.getElementById("langSelect")

const translations = {

en:{
htmlLang:"en",
htmlDir:"ltr",

brandTitle:"Xwenar",

contactTitle:"Contact Us",

contactDesc:
"If you have any questions, suggestions, or copyright requests, you can contact us directly using the information below.",

emailTitle:"Email",

phoneTitle:"Phone",

contactFooter:"Xwenar — Always with our readers 💙"
},

ckb:{
htmlLang:"ckb",
htmlDir:"rtl",

brandTitle:"خوێنەر",

contactTitle:"پەیوەندی",

contactDesc:
"ئەگەر هەر پرسیارێک، پێشنیارێک یان هەر شتێکت هەیە، دەتوانیت ڕاستەوخۆ پەیوەندیمان پێوە بکەیت.",

emailTitle:"ئیمەیڵ",

phoneTitle:"ژمارەی پەیوەندی",

contactFooter:"خوێنەر — هەمیشە لەگەڵ ئێوەین 💙"
}

}


function setLanguage(lang){

const tr = translations[lang] || translations.en

document.documentElement.lang = tr.htmlLang
document.documentElement.dir = tr.htmlDir

document.getElementById("brandTitle").innerText = tr.brandTitle

document.getElementById("contactTitle").innerText = tr.contactTitle
document.getElementById("contactDesc").innerText = tr.contactDesc

document.getElementById("emailTitle").innerText = tr.emailTitle
document.getElementById("phoneTitle").innerText = tr.phoneTitle

document.getElementById("contactFooter").innerText = tr.contactFooter

localStorage.setItem("siteLang",lang)

langSelect.value = lang
}


langSelect.addEventListener("change",(e)=>{
setLanguage(e.target.value)
})

const savedLang = localStorage.getItem("siteLang") || "en"

setLanguage(savedLang)

</script>

</body>
</html>
