      </div>

</div>

<footer class="footer-modern">
  <div class="footer-wrap">

    <div class="footer-col">
      <div class="footer-brand">

        کتێبخانەیەکی دیجیتاڵی بۆ خوێندن، فێربوون و گەشەپێدان

      <a href="contact.html">یارمەتی</a>
      <a href="ku-privacy-policy.html">سیاسەتی تایبەتی</a>
    </div>

    <div class="footer-col">
      <h4>داگرتن</h4>
      <div class="store-btns">
        <a href="https://play.google.com/store/apps/details?id=com.my.xwenar1"
           class="store google" target="_blank">
          <i class="fab fa-google-play"></i>
          <span>Play Store</span>

        <a href="https://apps.apple.com/us/app/xwenar/id6751713873"

        </a>

      </div>

  </div>

  <div class="footer-bottom">
    © 2026 Xwenar Library
  </div>
</footer>

<script src="app.js"></script>

<script>
const file = qs("file");
const rawName = qs("name") || "کتێب";

const elGrid = document.getElementById("grid");
const elEmpty = document.getElementById("empty");
const elStatus = document.getElementById("status");
const elSearch = document.getElementById("search");
const elSort = document.getElementById("sort");

let all = [];
let filtered = [];
let page = 0;
const SIZE = 20;

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, m => ({
    "&": "&amp;",
    "<": "&lt;",
    ">": "&gt;",
    '"': "&quot;",
    "'": "&#039;"
  }[m]));
}

function renderBatch(reset = false) {
  if (reset) {
    elGrid.innerHTML = "";
    page = 0;
  }

  const start = page * SIZE;
  const chunk = filtered.slice(start, start + SIZE);
  if (!chunk.length) return;

  chunk.forEach((b) => {
    const realId = all.indexOf(b);

    elGrid.insertAdjacentHTML("beforeend", `
      <div class="card">
        <div class="cover" onclick="openBook(${realId})">
          <img src="${b.image || ""}">
          <div class="badge">${rawName}</div>
        </div>

        <div class="meta">
          <div class="title">${escapeHtml(b.title || "")}</div>
          <div class="author">${escapeHtml(b.author || "")}</div>

          <button class="btn" onclick="openBook(${realId})">
            بینینی کتێب
          </button>
        </div>
      </div>
    `);
  });

  page++;
}

function apply() {
  const q = elSearch.value.toLowerCase();

  filtered = all.filter((b) =>
    String(b.title || "").toLowerCase().includes(q) ||
    String(b.author || "").toLowerCase().includes(q)
  );

  filtered.sort((a, b) => {
    return elSort.value === "za"
      ? b.title.localeCompare(a.title)
      : a.title.localeCompare(b.title);
  });

  elEmpty.style.display = filtered.length ? "none" : "block";
  renderBatch(true);
}

function openBook(id) {
  location.href = `book.html?file=${file}&id=${id}&name=${rawName}`;
}

window.addEventListener("scroll", () => {
  if (window.innerHeight + window.scrollY > document.body.offsetHeight - 300) {
    renderBatch();
  }
});

async function load() {
  elStatus.textContent = "چاوەڕێبە...";

  try {
    all = await fetchBooks(file);
    elStatus.textContent = `${all.length} کتێب بەردەستە`;
    apply();
  } catch {
    elStatus.textContent = "هەڵە";
  }
}

document.getElementById("reload").onclick = load;
elSearch.addEventListener("input", apply);
elSort.addEventListener("change", apply);

load();
</script>

</body>
</html>
